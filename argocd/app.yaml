apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: leetcode-pattern-tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jiaxiu11/leetcode-pattern-tracker
    targetRevision: HEAD
    path: k8s
    directory:
      exclude: 'db/secret.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
