name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  build:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/jiaxiu11/leetcode-pattern-tracker/frontend:${{ steps.tag.outputs.sha }}

      - name: Build and push backend
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/jiaxiu11/leetcode-pattern-tracker/backend:${{ steps.tag.outputs.sha }}

      - name: Update k8s image tags
        run: |
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|ghcr.io/jiaxiu11/leetcode-pattern-tracker/frontend:.*|ghcr.io/jiaxiu11/leetcode-pattern-tracker/frontend:${{ steps.tag.outputs.sha }}|" k8s/frontend/deployment.yaml
          fi
          if [ "${{ needs.changes.outputs.backend }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|ghcr.io/jiaxiu11/leetcode-pattern-tracker/backend:.*|ghcr.io/jiaxiu11/leetcode-pattern-tracker/backend:${{ steps.tag.outputs.sha }}|" k8s/backend/deployment.yaml
          fi

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend/deployment.yaml k8s/backend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.tag.outputs.sha }}"
          git push
